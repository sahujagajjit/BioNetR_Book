name: Deploy Bookdown Site

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install packages
        run: |
              Rscript -e 'install.packages(c("bookdown","rmarkdown","knitr","ggplot2","igraph"))'
              Rscript -e 'install.packages("BiocManager")'
              Rscript -e 'BiocManager::install("STRINGdb", ask = FALSE, update = FALSE)'

      - name: Build book
        run: Rscript -e 'bookdown::render_book("index.Rmd","bookdown::gitbook")'

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_book
