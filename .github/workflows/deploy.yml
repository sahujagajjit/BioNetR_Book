name: Deploy Bookdown Site

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2
      
      - name: Install system libraries
        run: |
             sudo apt-get update
             sudo apt-get install -y \
             libcurl4-openssl-dev \
             libssl-dev \
             libxml2-dev \
             libpng-dev

      - name: Install packages
        run: |
              Rscript -e '
                install.packages(c("bookdown","rmarkdown","knitr","ggplot2","igraph","curl","png","httr"));
                install.packages("BiocManager");
                BiocManager::install("STRINGdb", ask = FALSE, update = FALSE);
                '

      - name: Build book
        run: Rscript -e 'bookdown::render_book("index.Rmd","bookdown::gitbook")'

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_book/
          force_orphan: true

